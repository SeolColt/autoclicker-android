 name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v3

        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: '3.9'

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y build-essential python3-pip autoconf libtool
  pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
            pip install buildozer cython

        - name: Build APK
          run: buildozer -v android debug

        - name: Upload APK
          uses: actions/upload-artifact@v3
          with:
            name: autoclicker-apk
            path: bin/*.apk
