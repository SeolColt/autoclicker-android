name: Test Workflow

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: List files
          run: |
            echo "Files in repository:"
            ls -la
            echo ""
            echo "Checking for main.py..."
            if [ -f "main.py" ]; then
              echo "main.py found!"
            else
              echo "main.py NOT found!"
            fi
            echo ""
            echo "Checking for buildozer.spec..."
            if [ -f "buildozer.spec" ]; then
              echo "buildozer.spec found!"
            else
              echo "buildozer.spec NOT found!"
            fi

        - name: Test Python
          run: |
            python --version
            echo "Python is working!"
